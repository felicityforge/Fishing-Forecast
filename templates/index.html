<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fishing Forecast</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f0f8ff; }
        h1 { color: #004080; }
        form { margin-top: 20px; }
        label { display: block; margin: 10px 0 5px; }
        input { padding: 6px; width: 250px; }
        button { margin-top: 15px; padding: 8px 16px; background-color: #004080; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0066cc; }
    </style>
</head>
<body>
    <h1>Fishing Forecast</h1>

    <form id="forecastForm" action="/forecast" method="get">
        <label>Latitude (decimal degrees, e.g. 48.1101):</label>
        <input type="text" name="lat" required>

        <label>Longitude (decimal degrees, e.g. -122.3389):</label>
        <input type="text" name="lon" required>

        <p style="font-size: 0.9em; color: #555;">
            Click the map to automatically fill in coordinates, or enter your own (format: 48.1234, -122.5678).
        </p>

        <div id="map" style="height: 400px; margin-top: 10px;"></div>

        <label>Lake Name:</label>
        <input type="text" name="lake_name" placeholder="e.g., Silver Lake">

        <label>Species:</label>
        <select name="species" required>
            <option value="">Select species</option>
            <option value="Trout">Trout</option>
            <option value="Bass">Bass</option>
            <option value="Salmon">Salmon</option>
            <option value="Catfish">Catfish</option>
            <option value="Pike">Pike</option>
            <option value="Carp">Carp</option>
        </select>

        <label>Start Date:</label>
        <input type="date" name="start_date" required>

        <label>End Date:</label>
        <input type="date" name="end_date" required>

        <button type="submit">Get Forecast</button>
    </form>

    <div id="result"></div>

    <!-- Leaflet Map Script -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- MAP CLICK HANDLER WITH EXPANDED OVERPASS QUERY -->
    <script>
      const map = L.map('map').setView([48.1101, -122.3389], 7);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);

      let marker;

      map.on('click', async function(e) {
        const { lat, lng } = e.latlng;

        // Fill coordinates
        document.querySelector('[name="lat"]').value = lat.toFixed(4);
        document.querySelector('[name="lon"]').value = lng.toFixed(4);

        // Auto-name the lake
        const lakeNameInput = document.querySelector('[name="lake_name"]');
        lakeNameInput.value = "Searching…";

        let lakeName = null;

        try {
          const overpassQuery = `
            [out:json];
            (
              way["natural"="water"](around:800, ${lat}, ${lng});
              relation["natural"="water"](around:800, ${lat}, ${lng});
              way["water"="lake"](around:800, ${lat}, ${lng});
              relation["water"="lake"](around:800, ${lat}, ${lng});
              way["water"="reservoir"](around:800, ${lat}, ${lng});
              relation["water"="reservoir"](around:800, ${lat}, ${lng});
              way["landuse"="reservoir"](around:800, ${lat}, ${lng});
              relation["landuse"="reservoir"](around:800, ${lat}, ${lng});
              node["place"="locality"](around:800, ${lat}, ${lng});
              node["natural"="water"](around:800, ${lat}, ${lng});
            );
            out tags center;
          `;

          const overpassResponse = await fetch("https://overpass-api.de/api/interpreter", {
            method: "POST",
            body: overpassQuery
          });
