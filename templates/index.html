<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fishing Forecast</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f0f8ff; }
        h1 { color: #004080; }
        form { margin-top: 20px; }
        label { display: block; margin: 10px 0 5px; }
        input { padding: 6px; width: 250px; }
        button { margin-top: 15px; padding: 8px 16px; background-color: #004080; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0066cc; }
    </style>
</head>
<body>
    <h1>Fishing Forecast</h1>
    <form id="forecastForm" action="/forecast" method="get">
        <label>Latitude (decimal degrees, e.g. 48.1101):</label>
<input type="text" name="lat" required>

<label>Longitude (decimal degrees, e.g. -122.3389):</label>
<input type="text" name="lon" required>
<p style="font-size: 0.9em; color: #555;">
Click the map to automatically fill in coordinates, or enter your own (format: 48.1234, -122.5678).
</p>

<div id="map" style="height: 400px; margin-top: 10px;"></div>

<label>Lake Name:</label>
<input type="text" name="lake_name" placeholder="e.g., Silver Lake">


<label>Species:</label>
<select name="species" required>
  <option value="">Select species</option>
  <option value="Trout">Trout</option>
  <option value="Bass">Bass</option>
  <option value="Salmon">Salmon</option>
  <option value="Catfish">Catfish</option>
  <option value="Pike">Pike</option>
  <option value="Carp">Carp</option>
</select>

        <label>Start Date:</label>
        <input type="date" name="start_date" required>

        <label>End Date:</label>
        <input type="date" name="end_date" required>

        <button type="submit">Get Forecast</button>
    </form>
    <div id="result"></div>

<!-- Leaflet Map Script -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([48.1101, -122.3389], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  let marker;

  map.on('click', async function(e) {
    const { lat, lng } = e.latlng;

    // Fill coordinates
    document.querySelector('[name="lat"]').value = lat.toFixed(4);
    document.querySelector('[name="lon"]').value = lng.toFixed(4);

    // Auto-name the lake
    const lakeNameInput = document.querySelector('[name="lake_name"]');
    lakeNameInput.value = "Searching…";

    try {
      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=18&addressdetails=1`
      );
      const data = await response.json();

      let lakeName = null;
      if (data && data.address) {
        lakeName =
          data.address.lake ||
          data.address.water ||
          data.address.reservoir ||
          data.address.pond ||
          data.address.river ||
          data.address.stream ||
          null;
      }

      lakeNameInput.value = lakeName
        ? lakeName
        : `Unnamed waterbody at ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    } catch {
      lakeNameInput.value = `Unnamed waterbody at ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    }

    // Update marker
    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);
  });
</script>
    
<script>
  document.getElementById("forecastForm").addEventListener("submit", async (e) => {
    e.preventDefault(); // stop page reload
    const params = new URLSearchParams(new FormData(e.target));
    const response = await fetch("/forecast?" + params.toString());
    const data = await response.json();

    if (data.error) {
      document.getElementById("result").innerHTML = `<p style="color:red;">${data.error}</p>`;
      return;
    }

    let html = `<h3>${data.message}</h3>`;
    html += `<table border="1" cellpadding="6" style="border-collapse: collapse; margin-top: 10px;">
              <tr style="background-color:#004080; color:white;">
                <th>Date</th>
                <th>Best Hours</th>
                <th>Activity Score</th>
              </tr>`;

    data.reports.forEach(day => {
      html += `<tr>
                <td>${day.date}</td>
                <td>${day.best_block}</td>
                <td>${day.activity}%</td>
              </tr>`;
    });

    html += `</table>`;
    document.getElementById("result").innerHTML = html;
  });
</script>
</body>
</html>
